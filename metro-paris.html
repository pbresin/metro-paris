<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Mon Réseau IDF" />
  <meta name="theme-color" content="#0d0d0d" />
  <title>Mon Réseau Île-de-France</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root { --bg:#0d0d0d; --surface:#161616; --surface2:#1e1e1e; --border:rgba(255,255,255,0.07); --text:#f0ece4; --muted:rgba(240,236,228,0.4); }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100dvh;-webkit-tap-highlight-color:transparent}
    header{position:sticky;top:0;z-index:100;background:var(--bg);padding-top:env(safe-area-inset-top,0);border-bottom:1px solid var(--border)}
    .header-top{display:flex;align-items:center;gap:10px;padding:16px 16px 10px}
    .logo-m{width:34px;height:34px;background:#662483;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:20px;color:#fff;flex-shrink:0;box-shadow:0 0 16px rgba(102,36,131,.5)}
    h1{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:.04em;flex:1}
    .global-count{font-size:12px;color:var(--muted);letter-spacing:.06em;white-space:nowrap}
    .search-wrap{padding:0 16px 12px}
    .search-box{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:9px 12px}
    .search-box svg{flex-shrink:0;opacity:.4}
    .search-box input{background:none;border:none;outline:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;width:100%}
    .search-box input::placeholder{color:var(--muted)}
    .clear-btn{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;line-height:1;padding:0 2px;display:none}
    main{padding:12px 16px calc(40px + env(safe-area-inset-bottom,0))}
    .section{margin-bottom:10px;border:1px solid var(--border);border-radius:16px;overflow:hidden;background:var(--surface)}
    .section-header{display:flex;align-items:center;gap:10px;padding:14px 16px 10px;cursor:pointer;user-select:none;-webkit-user-select:none}
    .section-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
    .section-title-wrap{flex:1;min-width:0}
    .section-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.04em;line-height:1.1}
    .section-subtitle{font-size:10px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-top:1px}
    .section-chevron{color:var(--muted);transition:transform .3s ease;flex-shrink:0}
    .section.open .section-chevron{transform:rotate(180deg)}
    .section-progress{padding:0 16px 12px}
    .section-prog-row{display:flex;justify-content:space-between;margin-bottom:5px}
    .section-prog-count{font-size:12px;color:var(--muted)}
    .section-prog-pct{font-size:12px;font-weight:500}
    .prog-track{height:3px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
    .prog-fill{height:100%;border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1)}
    .section-body{max-height:0;overflow:hidden;transition:max-height .45s cubic-bezier(.4,0,.2,1)}
    .section.open .section-body{max-height:999999px}
    .section-lines{padding:0 12px 12px}
    .line-card{display:flex;align-items:center;gap:12px;padding:11px 12px;margin-bottom:6px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;cursor:pointer;user-select:none;-webkit-user-select:none;transition:transform .1s ease,opacity .2s ease;position:relative;overflow:hidden}
    .line-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--line-color,#555);opacity:.7}
    .line-card:active{transform:scale(.98)}
    .line-card.done{opacity:.55}
    .line-card.done::before{opacity:1}
    .line-card.hidden{display:none}
    .line-badge{width:36px;height:36px;border-radius:50%;background:var(--line-color,#555);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:13px;color:var(--badge-text,#fff);flex-shrink:0;letter-spacing:0}
    .line-card.done .line-badge{box-shadow:0 0 12px var(--line-glow,transparent)}
    .line-info{flex:1;min-width:0}
    .line-name{font-weight:500;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .line-termini{font-size:11px;color:var(--muted);font-weight:300;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .check-box{width:22px;height:22px;border-radius:50%;border:1.5px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .25s cubic-bezier(.34,1.56,.64,1)}
    .line-card.done .check-box{background:var(--line-color);border-color:var(--line-color)}
    .check-box svg{width:11px;height:11px;opacity:0;transform:scale(0);transition:all .2s cubic-bezier(.34,1.56,.64,1) .05s}
    .line-card.done .check-box svg{opacity:1;transform:scale(1)}
    .no-results{text-align:center;padding:40px 20px;color:var(--muted);font-size:14px;display:none}

    /* Bus loading state */
    .bus-loading{padding:20px 12px;text-align:center}
    .bus-loading-spinner{width:28px;height:28px;border:2px solid rgba(255,255,255,.1);border-top-color:#B8960C;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .bus-loading-text{font-size:12px;color:var(--muted)}
    .bus-error{padding:16px 12px;text-align:center;font-size:12px;color:var(--muted)}
    .bus-error button{margin-top:10px;background:#B8960C;color:#1a1a1a;border:none;border-radius:8px;padding:8px 16px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer}
    .bus-cache-info{padding:4px 16px 8px;font-size:10px;color:var(--muted);letter-spacing:.04em}

    .toast{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom,0));left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:#0d0d0d;padding:9px 18px;border-radius:50px;font-size:13px;font-weight:500;white-space:nowrap;z-index:999;transition:transform .35s cubic-bezier(.34,1.56,.64,1);pointer-events:none}
    .toast.show{transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>
<header>
  <div class="header-top">
    <div class="logo-m">M</div>
    <h1>Mon Réseau IDF</h1>
    <div class="global-count" id="global-count">0 / 0</div>
  </div>
  <div class="search-wrap">
    <div class="search-box">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="6.5" cy="6.5" r="5" stroke="#f0ece4" stroke-width="1.5"/><path d="M10.5 10.5L13.5 13.5" stroke="#f0ece4" stroke-width="1.5" stroke-linecap="round"/></svg>
      <input type="text" id="search-input" placeholder="Rechercher une ligne…" autocomplete="off" autocorrect="off" spellcheck="false"/>
      <button class="clear-btn" id="clear-btn">×</button>
    </div>
  </div>
</header>
<main id="main"><div class="no-results" id="no-results">Aucune ligne trouvée</div></main>
<div class="toast" id="toast"></div>

<script>
// ─── CONSTANTES ────────────────────────────────────────────────────────────
const STORAGE_KEY   = 'idf_tracker_v4';
const BUS_CACHE_KEY = 'idf_bus_cache_v1';
const BUS_CACHE_TTL = 7 * 24 * 60 * 60 * 1000; // 7 jours

  + '?where=operatorname%3D%22RATP%22%20AND%20transportmode%3D%22bus%22'
  + '&select=shortname_line%2Cname_line%2Ccolourweb_hexa%2Ctextcolourweb_hexa'

// ─── STATE ──────────────────────────────────────────────────────────────────
function loadState() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; } }
function saveState(s) { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }
let state = loadState();

// ─── BUS CACHE ───────────────────────────────────────────────────────────────
function loadBusCache() {
  try {
    const raw = localStorage.getItem(BUS_CACHE_KEY);
    if (!raw) return null;
    const { ts, lines } = JSON.parse(raw);
    if (Date.now() - ts > BUS_CACHE_TTL) return null;
    return { lines, ts };
  } catch { return null; }
}
function saveBusCache(lines) {
  localStorage.setItem(BUS_CACHE_KEY, JSON.stringify({ ts: Date.now(), lines }));
}

// ─── CONVERSION DONNÉE API → LIGNE ──────────────────────────────────────────
function apiRecordToLine(r) {
  const num   = (r.shortname_line || '?').trim();
  const name  = (r.name_line || 'Bus ' + num).trim();
  // couleur : l'API retourne une couleur hex sans #, on force or si absente
  const rawC  = r.colourweb_hexa || 'B8960C';
  const rawT  = r.textcolourweb_hexa || '1A1A1A';
  const color = '#' + rawC.replace('#','');
  const text  = '#' + rawT.replace('#','');
  return {
    id:      'bus_' + num.replace(/\s/g,'_'),
    num,
    name:    'Bus ' + num,
    termini: name,   // le name_line contient souvent "terminus A - terminus B"
    color,
    text
  };
}

// ─── FETCH API (avec pagination) ─────────────────────────────────────────────
async function fetchAllBusLines() {
  const allLines = [];
  let offset = 0;
  const limit = 100;

  while (true) {
    const url = API_URL + '&offset=' + offset;
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const records = data.results || [];
    records.forEach(r => allLines.push(apiRecordToLine(r)));
    if (records.length < limit) break;
    offset += limit;
  }

  // Trier par numéro (numérique puis alpha)
  allLines.sort((a, b) => {
    const na = parseInt(a.num) || 0;
    const nb = parseInt(b.num) || 0;
    if (na !== nb) return na - nb;
    return a.num.localeCompare(b.num);
  });

  return allLines;
}

// ─── BUILD DOM ───────────────────────────────────────────────────────────────
function buildAll(busLines, busFromCache, busCacheDate) {
  const main = document.getElementById('main');
  const noResults = document.getElementById('no-results');
  main.innerHTML = '';
  main.appendChild(noResults);

  // Sections fixes
  FIXED_SECTIONS.forEach(sec => {
    main.appendChild(buildSection(sec, sec.lines));
    updateSectionProgress(sec.id, sec.lines);
  });

  // Section bus
  const busSec = {
    id:'bus', title:'Bus RATP', subtitle:'Paris & Île-de-France',
    icon:'🚌', iconBg:'#1a1200', accentColor:'#C8A400'
  };
  const busWrap = buildSection(busSec, busLines);

  // Info cache
  if (busFromCache && busCacheDate) {
    const info = document.createElement('div');
    info.className = 'bus-cache-info';
    const d = new Date(busCacheDate);
    info.textContent = `Données du ${d.toLocaleDateString('fr-FR')} (cache local)`;
    busWrap.querySelector('.section-progress').after(info);
  }

  main.appendChild(busWrap);
  updateSectionProgress('bus', busLines);
  updateGlobal([...FIXED_SECTIONS.flatMap(s => s.lines), ...busLines]);
}

function buildSection(sec, lines) {
  const wrap = document.createElement('div');
  wrap.className = 'section' + (sec.id === 'metro' ? ' open' : '');
  wrap.dataset.section = sec.id;
  const iconStyle = sec.isMetroIcon
    ? "font-family:'Bebas Neue',sans-serif;font-size:18px;color:#fff;"
    : "font-size:16px;";
  wrap.innerHTML = `
    <div class="section-header" data-toggle="${sec.id}">
      <div class="section-icon" style="background:${sec.iconBg};${iconStyle}">${sec.icon}</div>
      <div class="section-title-wrap">
        <div class="section-title">${sec.title}</div>
        <div class="section-subtitle">${sec.subtitle}</div>
      </div>
      <svg class="section-chevron" width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M4 6l4 4 4-4" stroke="#f0ece4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="section-progress">
      <div class="section-prog-row">
        <span class="section-prog-count" id="prog-count-${sec.id}">0 / ${lines.length}</span>
        <span class="section-prog-pct" id="prog-pct-${sec.id}" style="color:${sec.accentColor}">0%</span>
      </div>
      <div class="prog-track"><div class="prog-fill" id="prog-fill-${sec.id}" style="background:${sec.accentColor};width:0%"></div></div>
    </div>
    <div class="section-body"><div class="section-lines" id="lines-${sec.id}"></div></div>
  `;
  const linesEl = wrap.querySelector(`#lines-${sec.id}`);
  lines.forEach(line => linesEl.appendChild(buildCard(line)));
  wrap.querySelector(`[data-toggle="${sec.id}"]`).addEventListener('click', () => wrap.classList.toggle('open'));
  return wrap;
}

function buildBusLoadingSection() {
  const wrap = document.createElement('div');
  wrap.className = 'section';
  wrap.dataset.section = 'bus';
  wrap.innerHTML = `
    <div class="section-header" data-toggle="bus">
      <div class="section-icon" style="background:#1a1200;font-size:16px;">🚌</div>
      <div class="section-title-wrap">
        <div class="section-title">Bus RATP</div>
        <div class="section-subtitle">Paris & Île-de-France</div>
      </div>
      <svg class="section-chevron" width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M4 6l4 4 4-4" stroke="#f0ece4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="section-body" style="max-height:999px">
      <div class="bus-loading">
        <div class="bus-loading-spinner"></div>
        <div class="bus-loading-text">Chargement des lignes depuis Île-de-France Mobilités…</div>
      </div>
    </div>
  `;
  wrap.querySelector('[data-toggle="bus"]').addEventListener('click', () => wrap.classList.toggle('open'));
  return wrap;
}

function buildBusErrorSection(onRetry) {
  const wrap = document.querySelector('[data-section="bus"]');
  if (!wrap) return;
  wrap.querySelector('.section-body').innerHTML = `
    <div class="bus-error">
      Impossible de charger les lignes de bus.<br>Vérifie ta connexion internet.
      <br><button id="retry-btn">Réessayer</button>
    </div>
  `;
  wrap.querySelector('#retry-btn').addEventListener('click', onRetry);
}

function buildCard(line) {
  const done = !!state[line.id];
  const card = document.createElement('div');
  card.className = 'line-card' + (done ? ' done' : '');
  card.dataset.id = line.id;
  card.dataset.search = (line.num + ' ' + line.name + ' ' + line.termini).toLowerCase();
  card.style.setProperty('--line-color', line.color);
  card.style.setProperty('--badge-text', line.text);
  card.style.setProperty('--line-glow', line.color + '55');
  const stroke = line.text === '#fff' ? '#fff' : '#1a1a1a';
  card.innerHTML = `
    <div class="line-badge">${line.num}</div>
    <div class="line-info">
      <div class="line-name">${line.name}</div>
      <div class="line-termini">${line.termini}</div>
    </div>
    <div class="check-box">
      <svg viewBox="0 0 13 10" fill="none">
        <path d="M1.5 5L5 8.5L11.5 1.5" stroke="${stroke}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  `;
  card.addEventListener('click', () => toggle(line.id, line.name));
  return card;
}

// ─── INTERACTIONS ────────────────────────────────────────────────────────────
function toggle(id, name) {
  state[id] = !state[id];
  saveState(state);
  document.querySelector(`.line-card[data-id="${id}"]`)?.classList.toggle('done', !!state[id]);
  // Recalc section progress
  FIXED_SECTIONS.forEach(sec => {
    if (sec.lines.find(l => l.id === id)) updateSectionProgress(sec.id, sec.lines);
  });
  // Bus section
  const busCards = document.querySelectorAll('[data-section="bus"] .line-card');
  if ([...busCards].find(c => c.dataset.id === id)) {
    const busLines = [...busCards].map(c => ({ id: c.dataset.id }));
    updateSectionProgress('bus', busLines);
  }
  const allLines = [...document.querySelectorAll('.line-card')].map(c => ({ id: c.dataset.id }));
  updateGlobal(allLines);
  if (state[id]) showToast('✓ ' + name + ' faite !');
}

function updateSectionProgress(secId, lines) {
  const total = lines.length;
  const done  = lines.filter(l => state[l.id]).length;
  const pct   = total ? Math.round((done / total) * 100) : 0;
  const countEl = document.getElementById('prog-count-' + secId);
  const pctEl   = document.getElementById('prog-pct-'   + secId);
  const fillEl  = document.getElementById('prog-fill-'  + secId);
  if (countEl) countEl.textContent = done + ' / ' + total;
  if (pctEl)   pctEl.textContent   = pct + '%';
  if (fillEl)  fillEl.style.width  = pct + '%';
}

function updateGlobal(lines) {
  const total = lines.length;
  const done  = lines.filter(l => state[l.id]).length;
  document.getElementById('global-count').textContent = done + ' / ' + total;
}

// ─── RECHERCHE ───────────────────────────────────────────────────────────────
const searchInput = document.getElementById('search-input');
const clearBtn    = document.getElementById('clear-btn');
searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  clearBtn.style.display = q ? 'block' : 'none';
  applySearch(q);
});
clearBtn.addEventListener('click', () => {
  searchInput.value = '';
  clearBtn.style.display = 'none';
  applySearch('');
});
function applySearch(q) {
  let anyVisible = false;
  document.querySelectorAll('.section').forEach(sectionEl => {
    let secHasVisible = false;
    sectionEl.querySelectorAll('.line-card').forEach(card => {
      const matches = !q || card.dataset.search.includes(q);
      card.classList.toggle('hidden', !matches);
      if (matches) secHasVisible = true;
    });
    if (q) sectionEl.classList.toggle('open', secHasVisible);
    sectionEl.style.display = secHasVisible || !q ? '' : 'none';
    if (secHasVisible || !q) anyVisible = true;
  });
  document.getElementById('no-results').style.display = anyVisible ? 'none' : 'block';
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ─── INITIALISATION ──────────────────────────────────────────────────────────
async function init() {
  const main     = document.getElementById('main');
  const noResults = document.getElementById('no-results');
  main.innerHTML = '';
  main.appendChild(noResults);

  // 1. Sections fixes d'abord
  FIXED_SECTIONS.forEach(sec => {
    main.appendChild(buildSection(sec, sec.lines));
    updateSectionProgress(sec.id, sec.lines);
  });

  // 2. Section bus : spinner pendant le chargement
  const busLoadingWrap = buildBusLoadingSection();
  main.appendChild(busLoadingWrap);

  // 3. Cache ?
  const cached = loadBusCache();
  if (cached) {
    // Affiche immédiatement depuis le cache
    replaceBusSection(cached.lines, true, cached.ts);
    updateGlobal([...FIXED_SECTIONS.flatMap(s => s.lines), ...cached.lines]);
    // Rafraîchit en arrière-plan si cache > 24h
    const age = Date.now() - cached.ts;
    if (age > 24 * 60 * 60 * 1000) refreshBusInBackground();
    return;
  }

  // 4. Pas de cache → fetch
  await loadBusFromAPI();
}

async function loadBusFromAPI() {
  try {
    const lines = await fetchAllBusLines();
    if (lines.length === 0) throw new Error('Aucune ligne reçue');
    saveBusCache(lines);
    replaceBusSection(lines, false, null);
    updateGlobal([...FIXED_SECTIONS.flatMap(s => s.lines), ...lines]);
    showToast('✓ ' + lines.length + ' lignes de bus chargées');
  } catch (e) {
    console.error(e);
    buildBusErrorSection(loadBusFromAPI);
  }
}

async function refreshBusInBackground() {
  try {
    const lines = await fetchAllBusLines();
    if (lines.length === 0) return;
    saveBusCache(lines);
    // Mise à jour silencieuse : on remplace juste le cache, pas l'UI
  } catch { /* silencieux */ }
}

function replaceBusSection(lines, fromCache, cacheTs) {
  const old = document.querySelector('[data-section="bus"]');
  const busSec = {
    id:'bus', title:'Bus RATP', subtitle:'Paris & Île-de-France',
    icon:'🚌', iconBg:'#1a1200', accentColor:'#C8A400'
  };
  const newWrap = buildSection(busSec, lines);

  if (fromCache && cacheTs) {
    const info = document.createElement('div');
    info.className = 'bus-cache-info';
    const d = new Date(cacheTs);
    info.textContent = `Données IDFM du ${d.toLocaleDateString('fr-FR')} · ${lines.length} lignes`;
    newWrap.querySelector('.section-progress').after(info);
  }

  if (old) old.replaceWith(newWrap);
  else document.getElementById('main').appendChild(newWrap);

  updateSectionProgress('bus', lines);
}

init();
</script>

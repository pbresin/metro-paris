<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Mon Réseau IDF"/>
  <meta name="theme-color" content="#0d0d0d"/>
  <title>Mon Réseau Île-de-France</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#0d0d0d;--surface:#161616;--surface2:#1e1e1e;--border:rgba(255,255,255,0.07);--text:#f0ece4;--muted:rgba(240,236,228,0.4)}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100dvh;-webkit-tap-highlight-color:transparent}

    /* ── HEADER ── */
    header{position:sticky;top:0;z-index:100;background:var(--bg);padding-top:env(safe-area-inset-top,0);border-bottom:1px solid var(--border)}
    .header-top{display:flex;align-items:center;gap:10px;padding:16px 16px 10px}
    .logo-m{width:34px;height:34px;background:#662483;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:20px;color:#fff;flex-shrink:0;box-shadow:0 0 16px rgba(102,36,131,.5)}
    h1{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:.04em;flex:1}
    .global-count{font-size:12px;color:var(--muted);letter-spacing:.06em;white-space:nowrap}

    /* ── BACKUP BAR ── */
    .backup-bar{display:flex;gap:8px;padding:0 16px 12px}
    .backup-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:9px 12px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;-webkit-tap-highlight-color:transparent}
    .backup-btn:active{opacity:.7}
    .backup-btn.export{border-color:rgba(184,150,12,.3);color:#C8A400}
    .backup-btn.import{border-color:rgba(74,175,74,.3);color:#4aaf4a}
    #import-file{display:none}

    /* ── SEARCH ── */
    .search-wrap{padding:0 16px 12px}
    .search-box{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:9px 12px}
    .search-box svg{flex-shrink:0;opacity:.4}
    .search-box input{background:none;border:none;outline:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;width:100%}
    .search-box input::placeholder{color:var(--muted)}
    .clear-btn{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;line-height:1;padding:0 2px;display:none}

    main{padding:12px 16px calc(40px + env(safe-area-inset-bottom,0))}

    /* ── SECTIONS ── */
    .section{margin-bottom:10px;border:1px solid var(--border);border-radius:16px;overflow:hidden;background:var(--surface)}
    .section-header{display:flex;align-items:center;gap:10px;padding:14px 16px 10px;cursor:pointer;user-select:none;-webkit-user-select:none}
    .section-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
    .section-title-wrap{flex:1;min-width:0}
    .section-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.04em;line-height:1.1}
    .section-subtitle{font-size:10px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-top:1px}
    .section-chevron{color:var(--muted);transition:transform .3s ease;flex-shrink:0}
    .section.open>.section-header .section-chevron{transform:rotate(180deg)}
    .section-progress{padding:0 16px 12px}
    .section-prog-row{display:flex;justify-content:space-between;margin-bottom:5px}
    .section-prog-count{font-size:12px;color:var(--muted)}
    .section-prog-pct{font-size:12px;font-weight:500}
    .prog-track{height:3px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
    .prog-fill{height:100%;border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1)}
    .section-body{max-height:0;overflow:hidden;transition:max-height .45s cubic-bezier(.4,0,.2,1)}
    .section.open>.section-body{max-height:999999px}
    .section-lines{padding:0 12px 12px}

    /* ── SOUS-CATÉGORIES BUS ── */
    .subcat{margin-bottom:8px;border:1px solid rgba(255,255,255,0.05);border-radius:12px;overflow:hidden;background:rgba(255,255,255,0.02)}
    .subcat-header{display:flex;align-items:center;gap:8px;padding:10px 12px 8px;cursor:pointer;user-select:none;-webkit-user-select:none}
    .subcat-badge{height:20px;padding:0 8px;border-radius:10px;font-size:10px;font-weight:500;letter-spacing:.06em;display:flex;align-items:center;text-transform:uppercase;flex-shrink:0}
    .subcat-title-wrap{flex:1;min-width:0}
    .subcat-title{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:.04em}
    .subcat-count{font-size:10px;color:var(--muted);margin-top:1px}
    .subcat-chevron{color:var(--muted);transition:transform .3s ease;flex-shrink:0}
    .subcat.open .subcat-chevron{transform:rotate(180deg)}
    .subcat-prog-track{height:2px;background:rgba(255,255,255,.06);margin:0 12px 8px;border-radius:1px;overflow:hidden}
    .subcat-prog-fill{height:100%;border-radius:1px;transition:width .5s cubic-bezier(.4,0,.2,1)}
    .subcat-body{max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.4,0,.2,1)}
    .subcat.open .subcat-body{max-height:999999px}
    .subcat-lines{padding:0 8px 8px}

    /* ── CARTES ── */
    .line-card{display:flex;align-items:center;gap:12px;padding:10px 11px;margin-bottom:5px;background:var(--surface2);border:1px solid var(--border);border-radius:11px;cursor:pointer;user-select:none;-webkit-user-select:none;transition:transform .1s ease,opacity .2s ease;position:relative;overflow:hidden}
    .line-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--line-color,#555);opacity:.7}
    .line-card:active{transform:scale(.98)}
    .line-card.done{opacity:.5}
    .line-card.done::before{opacity:1}
    .line-card.hidden{display:none}
    .line-badge{width:34px;height:34px;border-radius:50%;background:var(--line-color,#555);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:13px;color:var(--badge-text,#fff);flex-shrink:0;letter-spacing:0}
    .line-card.done .line-badge{box-shadow:0 0 10px var(--line-glow,transparent)}
    .line-info{flex:1;min-width:0}
    .line-name{font-weight:500;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .line-termini{font-size:11px;color:var(--muted);font-weight:300;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .check-box{width:21px;height:21px;border-radius:50%;border:1.5px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .25s cubic-bezier(.34,1.56,.64,1)}
    .line-card.done .check-box{background:var(--line-color);border-color:var(--line-color)}
    .check-box svg{width:10px;height:10px;opacity:0;transform:scale(0);transition:all .2s cubic-bezier(.34,1.56,.64,1) .05s}
    .line-card.done .check-box svg{opacity:1;transform:scale(1)}

    /* ── MODAL BACKUP ── */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:flex-end;justify-content:center;padding:0 0 env(safe-area-inset-bottom,0)}
    .modal-overlay.hidden{display:none}
    .modal{background:#1a1a1a;border:1px solid var(--border);border-radius:20px 20px 0 0;padding:24px 20px;width:100%;max-width:480px}
    .modal h2{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.04em;margin-bottom:8px}
    .modal p{font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.5}
    .modal textarea{width:100%;height:140px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:monospace;font-size:11px;padding:10px;resize:none;outline:none;margin-bottom:12px}
    .modal-btns{display:flex;gap:8px}
    .modal-btn{flex:1;padding:12px;border-radius:10px;border:none;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer}
    .modal-btn.primary{background:#C8A400;color:#1a1a1a}
    .modal-btn.secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
    .modal-ok{color:#4aaf4a;font-size:12px;text-align:center;margin-top:8px;display:none}

    .no-results{text-align:center;padding:40px 20px;color:var(--muted);font-size:14px;display:none}
    .toast{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom,0));left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:#0d0d0d;padding:9px 18px;border-radius:50px;font-size:13px;font-weight:500;white-space:nowrap;z-index:999;transition:transform .35s cubic-bezier(.34,1.56,.64,1);pointer-events:none}
    .toast.show{transform:translateX(-50%) translateY(0)}
  </style>
</head>

<header>
  <div class="header-top">
    <div class="logo-m">M</div>
    <h1>Mon Réseau IDF</h1>
    <div class="global-count" id="global-count">0 / 0</div>
  </div>
  <div class="backup-bar">
    <button class="backup-btn export" onclick="openExport()">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1v8M3 6l3.5 3.5L10 6M1 11.5h11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Exporter mes coches
    </button>
    <button class="backup-btn import" onclick="document.getElementById('import-file').click()">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 9V1M3 4l3.5-3.5L10 4M1 11.5h11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Importer
    </button>
    <input type="file" id="import-file" accept=".json" onchange="importFromFile(event)"/>
  </div>
  <div class="search-wrap">
    <div class="search-box">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="6.5" cy="6.5" r="5" stroke="#f0ece4" stroke-width="1.5"/><path d="M10.5 10.5L13.5 13.5" stroke="#f0ece4" stroke-width="1.5" stroke-linecap="round"/></svg>
      <input type="text" id="search-input" placeholder="Rechercher une ligne…" autocomplete="off" autocorrect="off" spellcheck="false"/>
      <button class="clear-btn" id="clear-btn">×</button>
    </div>
  </div>
</header>

<main id="main"><div class="no-results" id="no-results">Aucune ligne trouvée</div></main>

<!-- Modal export -->
<div class="modal-overlay hidden" id="export-modal">
  <div class="modal">
    <h2>Exporter mes coches</h2>
    <p>Copie ce code et garde-le précieusement. Il contient toutes tes lignes cochées. Tu pourras le réimporter plus tard.</p>
    <textarea id="export-text" readonly></textarea>
    <div class="modal-btns">
      <button class="modal-btn primary" onclick="copyExport()">📋 Copier</button>
      <button class="modal-btn secondary" onclick="downloadExport()">💾 Télécharger</button>
      <button class="modal-btn secondary" onclick="closeModal()">Fermer</button>
    </div>
    <div class="modal-ok" id="copy-ok">✓ Copié !</div>
  </div>
</div>

<div class="toast" id="toast"></div>

const BUS_SUBCATS = [
  {key:'Paris',    label:'Paris',     badge:'Paris',    badgeBg:'#1a3a6e',badgeText:'#7ab0ff',barColor:'#4a90d9'},
  {key:'Banlieue', label:'Banlieue',  badge:'Banlieue', badgeBg:'#1a3a1a',badgeText:'#7acc7a',barColor:'#4aad4a'},
  {key:'Traverse', label:'Traverses', badge:'Traverse', badgeBg:'#3a2a1a',badgeText:'#ffa050',barColor:'#d4820a'},
  {key:'Urbain',   label:'Urbain',    badge:'Urbain',   badgeBg:'#2a1a3a',badgeText:'#c080ff',barColor:'#8040c0'},
  {key:'Local',    label:'Local',     badge:'Local',    badgeBg:'#1a2a2a',badgeText:'#60cccc',barColor:'#309090'},
  {key:'Noctilien',label:'Noctilien', badge:'Noctilien',badgeBg:'#0d0d2a',badgeText:'#a0a0ff',barColor:'#4040d0'},
];

const BUS_COLOR = '#B8960C';
const BUS_TEXT  = '#1a1a1a';
const STORAGE_KEY = 'idf_tracker_v4';

function loadState(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{};}catch{return{};}}
function saveState(s){localStorage.setItem(STORAGE_KEY,JSON.stringify(s));}
let state = loadState();

// ── BACKUP ────────────────────────────────────────────────────────────────
function openExport(){
  const checked = Object.keys(state).filter(k=>state[k]);
  const payload = {
    version: 1,
    date: new Date().toISOString().slice(0,10),
    app: 'idf_tracker_v4',
    checked
  };
  document.getElementById('export-text').value = JSON.stringify(payload, null, 2);
  document.getElementById('export-modal').classList.remove('hidden');
  document.getElementById('copy-ok').style.display='none';
}

function closeModal(){
  document.getElementById('export-modal').classList.add('hidden');
}

function copyExport(){
  const ta = document.getElementById('export-text');
  ta.select();
  try {
    navigator.clipboard.writeText(ta.value).catch(()=>document.execCommand('copy'));
  } catch { document.execCommand('copy'); }
  const ok = document.getElementById('copy-ok');
  ok.style.display='block';
  setTimeout(()=>ok.style.display='none', 2000);
}

function downloadExport(){
  const text = document.getElementById('export-text').value;
  const blob = new Blob([text], {type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = 'idf-coches-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importFromFile(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const payload = JSON.parse(ev.target.result);
      if(!payload.checked || !Array.isArray(payload.checked))
        throw new Error('Format invalide');
      const newState = {};
      payload.checked.forEach(k=>newState[k]=true);
      // Fusionner avec l'état actuel (on garde les coches déjà présentes)
      const merged = {...state, ...newState};
      Object.assign(state, merged);
      saveState(state);
      // Rafraîchir toutes les cartes
      document.querySelectorAll('.line-card').forEach(card=>{
        card.classList.toggle('done', !!state[card.dataset.id]);
      });
      refreshAllProgress();
      showToast('✓ ' + payload.checked.length + ' coches importées !');
    } catch(err) {
      showToast('❌ Fichier invalide');
    }
    e.target.value = '';
  };
  reader.readAsText(file);
}

// Fermer modal en cliquant l'overlay
document.addEventListener('click', e=>{
  if(e.target.id==='export-modal') closeModal();
});

// ── HELPERS ───────────────────────────────────────────────────────────────
function busId(cat,num){return 'bus_'+cat+'_'+String(num).replace(/\s/g,'_');}
function chevronSVG(cls){
  return `<svg class="${cls}" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="#f0ece4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

function buildCard(line){
  const done = !!state[line.id];
  const card = document.createElement('div');
  card.className = 'line-card'+(done?' done':'');
  card.dataset.id = line.id;
  card.dataset.search = (line.num+' '+(line.name||'')+' '+(line.termini||'')).toLowerCase();
  card.style.setProperty('--line-color',line.color);
  card.style.setProperty('--badge-text',line.text);
  card.style.setProperty('--line-glow',line.color+'55');
  const stroke = line.text==='#fff'?'#fff':'#1a1a1a';
  card.innerHTML = `
    <div class="line-badge">${line.num}</div>
    <div class="line-info">
      <div class="line-name">${line.name||'Bus '+line.num}</div>
      <div class="line-termini">${line.termini||''}</div>
    </div>
    <div class="check-box">
      <svg viewBox="0 0 13 10" fill="none"><path d="M1.5 5L5 8.5L11.5 1.5" stroke="${stroke}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>`;
  card.addEventListener('click',()=>toggle(line.id,line.name||'Bus '+line.num));
  return card;
}

function toggle(id,name){
  state[id]=!state[id];
  saveState(state);
  document.querySelector(`.line-card[data-id="${id}"]`)?.classList.toggle('done',!!state[id]);
  refreshAllProgress();
  if(state[id]) showToast('✓ '+name+' faite !');
}

// ── PROGRESS ──────────────────────────────────────────────────────────────
function setProgress(countEl,pctEl,fillEl,done,total){
  if(!countEl)return;
  const pct=total?Math.round((done/total)*100):0;
  countEl.textContent=done+' / '+total;
  if(pctEl)pctEl.textContent=pct+'%';
  if(fillEl)fillEl.style.width=pct+'%';
}

function refreshAllProgress(){
  FIXED_SECTIONS.forEach(sec=>{
    const cards=[...document.querySelectorAll(`#lines-${sec.id} .line-card`)];
    setProgress(
      document.getElementById('prog-count-'+sec.id),
      document.getElementById('prog-pct-'+sec.id),
      document.getElementById('prog-fill-'+sec.id),
      cards.filter(c=>state[c.dataset.id]).length, cards.length
    );
  });
  BUS_SUBCATS.forEach(sc=>{
    const cards=[...document.querySelectorAll(`#subcat-lines-${sc.key} .line-card`)];
    setProgress(
      document.getElementById('subcat-count-'+sc.key),null,
      document.getElementById('subcat-fill-'+sc.key),
      cards.filter(c=>state[c.dataset.id]).length,cards.length
    );
  });
  const allBus=[...document.querySelectorAll('[data-section="bus"] .line-card')];
  setProgress(
    document.getElementById('prog-count-bus'),
    document.getElementById('prog-pct-bus'),
    document.getElementById('prog-fill-bus'),
    allBus.filter(c=>state[c.dataset.id]).length,allBus.length
  );
  const all=[...document.querySelectorAll('.line-card')];
  document.getElementById('global-count').textContent=
    all.filter(c=>state[c.dataset.id]).length+' / '+all.length;
}

// ── BUILD DOM ─────────────────────────────────────────────────────────────
function buildFixedSection(sec){
  const wrap=document.createElement('div');
  wrap.className='section'+(sec.id==='metro'?' open':'');
  wrap.dataset.section=sec.id;
  const iconStyle=sec.isMetroIcon?"font-family:'Bebas Neue',sans-serif;font-size:18px;color:#fff;":"font-size:16px;";
  wrap.innerHTML=`
    <div class="section-header" data-toggle="${sec.id}">
      <div class="section-icon" style="background:${sec.iconBg};${iconStyle}">${sec.icon}</div>
      <div class="section-title-wrap">
        <div class="section-title">${sec.title}</div>
        <div class="section-subtitle">${sec.subtitle}</div>
      </div>
      ${chevronSVG('section-chevron')}
    </div>
    <div class="section-progress">
      <div class="section-prog-row">
        <span class="section-prog-count" id="prog-count-${sec.id}">0 / ${sec.lines.length}</span>
        <span class="section-prog-pct" id="prog-pct-${sec.id}" style="color:${sec.accentColor}">0%</span>
      </div>
      <div class="prog-track"><div class="prog-fill" id="prog-fill-${sec.id}" style="background:${sec.accentColor};width:0%"></div></div>
    </div>
    <div class="section-body"><div class="section-lines" id="lines-${sec.id}"></div></div>`;
  sec.lines.forEach(l=>wrap.querySelector('#lines-'+sec.id).appendChild(buildCard(l)));
  wrap.querySelector('[data-toggle]').addEventListener('click',()=>wrap.classList.toggle('open'));
  return wrap;
}

function buildBusSection(){
  const total=BUS_SUBCATS.reduce((s,sc)=>s+(BUS_DATA[sc.key]||[]).length,0);
  const wrap=document.createElement('div');
  wrap.className='section';
  wrap.dataset.section='bus';
  wrap.innerHTML=`
    <div class="section-header" data-toggle="bus">
      <div class="section-icon" style="background:#1a1200;font-size:16px;">🚌</div>
      <div class="section-title-wrap">
        <div class="section-title">Bus RATP</div>
        <div class="section-subtitle">Paris & Île-de-France</div>
      </div>
      ${chevronSVG('section-chevron')}
    </div>
    <div class="section-progress">
      <div class="section-prog-row">
        <span class="section-prog-count" id="prog-count-bus">0 / ${total}</span>
        <span class="section-prog-pct" id="prog-pct-bus" style="color:#C8A400">0%</span>
      </div>
      <div class="prog-track"><div class="prog-fill" id="prog-fill-bus" style="background:#C8A400;width:0%"></div></div>
    </div>
    <div class="section-body" id="bus-body"></div>`;
  wrap.querySelector('[data-toggle]').addEventListener('click',()=>wrap.classList.toggle('open'));
  const busBody=wrap.querySelector('#bus-body');
  BUS_SUBCATS.forEach(sc=>{
    const lines=BUS_DATA[sc.key]||[];
    if(!lines.length)return;
    const sub=document.createElement('div');
    sub.className='subcat';
    sub.dataset.subcat=sc.key;
    sub.innerHTML=`
      <div class="subcat-header">
        <div class="subcat-badge" style="background:${sc.badgeBg};color:${sc.badgeText}">${sc.badge}</div>
        <div class="subcat-title-wrap">
          <div class="subcat-title">${sc.label}</div>
          <div class="subcat-count" id="subcat-count-${sc.key}">0 / ${lines.length}</div>
        </div>
        ${chevronSVG('subcat-chevron')}
      </div>
      <div class="subcat-prog-track"><div class="subcat-prog-fill" id="subcat-fill-${sc.key}" style="background:${sc.barColor};width:0%"></div></div>
      <div class="subcat-body"><div class="subcat-lines" id="subcat-lines-${sc.key}"></div></div>`;
    sub.querySelector('.subcat-header').addEventListener('click',()=>sub.classList.toggle('open'));
    busBody.appendChild(sub);
    const linesEl=sub.querySelector('#subcat-lines-'+sc.key);
    lines.forEach(l=>{
      const id=busId(sc.key,l.num);
      const termini=l.t1&&l.t2?l.t1+' ↔ '+l.t2:(l.t1||l.t2||'');
      const isNoc=sc.key==='Noctilien';
      linesEl.appendChild(buildCard({
        id, num:l.num,
        name: isNoc ? l.num : 'Bus '+l.num,
        termini,
        color: isNoc?'#1a1a6e':BUS_COLOR,
        text:  isNoc?'#a0a0ff':BUS_TEXT
      }));
    });
  });
  return wrap;
}

// ── RECHERCHE ─────────────────────────────────────────────────────────────
const searchInput=document.getElementById('search-input');
const clearBtn=document.getElementById('clear-btn');
searchInput.addEventListener('input',()=>{
  const q=searchInput.value.trim().toLowerCase();
  clearBtn.style.display=q?'block':'none';
  applySearch(q);
});
clearBtn.addEventListener('click',()=>{searchInput.value='';clearBtn.style.display='none';applySearch('');});

function applySearch(q){
  let anyVisible=false;
  document.querySelectorAll('.section').forEach(secEl=>{
    let secHas=false;
    secEl.querySelectorAll('.subcat').forEach(subEl=>{
      let subHas=false;
      subEl.querySelectorAll('.line-card').forEach(card=>{
        const m=!q||card.dataset.search.includes(q);
        card.classList.toggle('hidden',!m);
        if(m)subHas=true;
      });
      if(q)subEl.classList.toggle('open',subHas);
      subEl.style.display=subHas||!q?'':'none';
      if(subHas)secHas=true;
    });
    secEl.querySelectorAll('.section-lines>.line-card').forEach(card=>{
      const m=!q||card.dataset.search.includes(q);
      card.classList.toggle('hidden',!m);
      if(m)secHas=true;
    });
    if(q)secEl.classList.toggle('open',secHas);
    secEl.style.display=secHas||!q?'':'none';
    if(secHas||!q)anyVisible=true;
  });
  document.getElementById('no-results').style.display=anyVisible?'none':'block';
}

// ── TOAST ─────────────────────────────────────────────────────────────────
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// ── INIT ──────────────────────────────────────────────────────────────────
function init(){
  const main=document.getElementById('main');
  const nr=document.getElementById('no-results');
  main.innerHTML='';main.appendChild(nr);
  FIXED_SECTIONS.forEach(sec=>main.appendChild(buildFixedSection(sec)));
  main.appendChild(buildBusSection());
  refreshAllProgress();
}

init();
</script>
